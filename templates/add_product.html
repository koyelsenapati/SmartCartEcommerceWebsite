{% extends "base.html" %}

{% block content %}

<h2>Add New Product</h2>

<form method="POST">

    <input 
        type="text"
        name="name"
        placeholder="Product Name"
        required
    >

    <br><br>

    <textarea 
        name="description"
        placeholder="Product Description"
        required
    ></textarea>

    <br><br>

    <input 
        type="number"
        name="price"
        placeholder="Price"
        required
    >

    <br><br>

    <input 
        type="text"
        name="image_url"
        placeholder="Image URL"
    >

    <br><br>

    <input 
        type="number"
        name="stock"
        placeholder="Stock Quantity"
        required
    >

    <br><br>

    <button type="submit">
        Add Product
    </button>

</form>

{% endblock %}
