{% extends "base.html" %}

{% block content %}

<section class="register-section">

    <div class="register-box">

        <h1>
            Create Account
        </h1>

        <form method="POST">


            <label for="fullname">
                Full Name
            </label>

            <input 
                type="text"
                id="fullname"
                name="fullname"
                placeholder="Enter Full Name"
                autocomplete="name"
                required
            >


            <label for="email">
                Email Address
            </label>

            <input 
                type="email"
                id="email"
                name="email"
                placeholder="Enter Email Address"
                autocomplete="email"
                required
            >


            <label for="password">
                Password
            </label>

            <input 
                type="password"
                id="password"
                name="password"
                placeholder="Create Password"
                autocomplete="new-password"
                required
            >


            <label for="confirm_password">
                Confirm Password
            </label>

            <input 
                type="password"
                id="confirm_password"
                name="confirm_password"
                placeholder="Confirm Password"
                autocomplete="new-password"
                required
            >


            <button type="submit">
                Register
            </button>

        </form>


        <p>
            Already have an account?

            <a href="{{ url_for('login') }}">
                Login Here
            </a>

        </p>

    </div>

</section>

{% endblock %}
