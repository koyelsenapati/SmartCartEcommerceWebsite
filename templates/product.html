{% extends "base.html" %}


{% block content %}

<section class="product-details">


    <div class="product-image">

        <img 
            src="{{ product.image_url }}"
            alt="{{ product.name }}"
        >

    </div>


    <div class="product-info">


        <h2>
            {{ product.name }}
        </h2>


        <p>
            {{ product.description }}
        </p>


        <h3>
            ₹{{ product.price }}
        </h3>


        <p>
            ⭐ 4.5/5 Rating
        </p>


        <button>
            Add To Cart
        </button>


    </div>


</section>


{% endblock %}
