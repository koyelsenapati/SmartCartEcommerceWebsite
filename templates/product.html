{% extends "base.html" %}


{% block content %}

<section class="product-details">


    <div class="product-image">

        <img 
        src="https://via.placeholder.com/350"
        alt="Product">

    </div>


    <div class="product-info">

        <h1>
            Product ID: {{ product_id }}
        </h1>


        <h2>
            Smart Watch
        </h2>


        <p>
            Premium smartwatch with heart-rate monitor,
            fitness tracking and long battery life.
        </p>


        <h3>
            ₹2999
        </h3>


        <p>
            ⭐ 4.5/5 Rating
        </p>


        <button>
            Add To Cart
        </button>


    </div>


</section>

{% endblock %}
