{% extends "base.html" %}

{% block content %}

<h1>Edit Product ✏️</h1>

<form method="POST">

    <input 
        type="text"
        name="name"
        value="{{ product.name }}"
        placeholder="Product Name"
        required
    >

    <br><br>


    <textarea
        name="description"
        placeholder="Product Description"
        required
    >{{ product.description }}</textarea>

    <br><br>


    <input 
        type="number"
        name="price"
        value="{{ product.price }}"
        placeholder="Price"
        required
    >

    <br><br>


    <input 
        type="text"
        name="image_url"
        value="{{ product.image_url }}"
        placeholder="Image URL"
    >

    <br><br>


    <input 
        type="number"
        name="stock"
        value="{{ product.stock }}"
        placeholder="Stock Quantity"
        required
    >

    <br><br>


    <button type="submit">
        Update Product ✅
    </button>

</form>

{% endblock %}
