{% extends "base.html" %}


{% block content %}

<section class="admin-dashboard">

    <h1>
        Admin Dashboard 📊
    </h1>


    <div class="dashboard-container">


        <div class="dashboard-card">

            <h2>
                👤 Total Users
            </h2>

            <h3>
                {{ users.total_users }}
            </h3>

        </div>


        <div class="dashboard-card">

            <h2>
                📦 Total Products
            </h2>

            <h3>
                {{ products.total_products }}
            </h3>

        </div>


        <div class="dashboard-card">

            <h2>
                🛒 Total Orders
            </h2>

            <h3>
                {{ orders.total_orders }}
            </h3>

        </div>


        <div class="dashboard-card">

            <h2>
                💰 Total Revenue
            </h2>

            <h3>
                ₹{{ revenue.revenue or 0 }}
            </h3>

        </div>


    </div>


    <br>


    <a href="{{ url_for('admin.products') }}">

        <button>
            Manage Products 📦
        </button>

    </a>


</section>


{% endblock %}
