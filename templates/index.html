{% extends "base.html" %}


{% block content %}

<section class="hero">

    <h1>
        Welcome to SmartCart
    </h1>

    <p>
        Your AI Powered Shopping Partner
    </p>

    <a href="{{ url_for('products') }}">

        <button>
            Shop Now
        </button>

    </a>

</section>


<section class="products">

    <h2>
        Featured Products
    </h2>

    <div class="product-container">

        {% for product in products %}

        <div class="card">

            <img src="{{ product.image_url }}" alt="{{ product.name }}">

            <h3>
                {{ product.name }}
            </h3>

            <p>
                ₹{{ product.price }}
            </p>

            <button>
                Buy Now
            </button>

        </div>

        {% endfor %}

    </div>

</section>


{% endblock %}
