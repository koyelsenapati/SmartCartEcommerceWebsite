{% extends "base.html" %}


{% block content %}

<section class="orders">

    <h1>
        My Orders 📦
    </h1>


    {% if orders %}


        {% for order in orders %}

        <div class="order-card">

            <h2>
                Order ID: {{ order.id }}
            </h2>


            <p>
                Date:
                {{ order.order_date }}
            </p>


            <h3>
                Total Amount:
                ₹{{ order.total_price }}
            </h3>

        </div>

        {% endfor %}


    {% else %}

        <h2>
            No Orders Yet 😔
        </h2>

    {% endif %}


</section>

{% endblock %}
